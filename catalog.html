<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>каталог</title>
</head>
<body>
     <!-- Шапка -->
    <header class="page-header">
        
            <!-- логотип в шапке слева-->
            <a class="navigation-logo" href="index.html"><img src="logo.png" alt="Логотип Седона" class="logo"></a>
            <!-- Навигация шапки слева-->
            <nav class="navigation">
                <ul class="navigation-list">
                    <li class="navigation-item">
                        <a class="navigation-link" href="#" >Главная</a>
                    </li>
                    <li class="navigation-item">
                        <a class="navigation-link" href="#">О Седоне</a>
                    </li>
                    <li class="navigation-item">
                        <a class="navigation-link navigation-link-current" href="catalog.html">Гостиницы</a>
                    </li>
                </ul>
            
            
            <!-- список навигации шапки справа-->
                <ul class="navigation-list navigation-user">
                    <li class="navigation-item">
                        <a class="navigation-link" href="#">
                          <span class="visually-hidden">поиск</span>
                        </a>
                    </li>
                    <li class="navigation-item">
                        <a class="navigation-link" href="#">
                            <span class="visually-hidden">избранное</span>
                        </a>
                    </li>
                    <li class="navigation-item">
                        <a class="button navigation-link" href="#">хочу сюда</a>
                    </li>
                </ul>
            </nav>
        
    </header>

    <main>
        <!-- Заголовок страницы -->
      <section class="filter">
        <h1 class="filter-title">Гостиницы Седоны</h1>
       <!-- Хлебные крошки -->
        <ul class="breadcrumbs">
          <li class="breadcrumbs-item">
            <a class="breadcrumbs-link breadcrumbs-link-home" href="index.html">
              <span class="visually-hidden">Главная</span>
            </a>
          </li>
          <li class="breadcrumbs-item">
            <a class="breadcrumbs-link">Гостиницы</a>
          </li>
        </ul>

    <!-- Блок фильтров -->
        <div class="filters-div">
            <section class="filters container">
                <h2 class="section-title visually-hidden">Фильтры</h2>
                <!-- Инфраструктура -->
                <form class="filter-form">
                    <fieldset class="filter-group">
                        <legend>Инфраструктура:</legend>
                        <label><input type="checkbox" checked> Бассейн</label>
                        <label><input type="checkbox" checked> Парковка</label>
                        <label><input type="checkbox"> Wi-Fi</label>
                    </fieldset>

                    <!-- Тип жилья -->
                    <fieldset class="filter-search-group">
                        <legend class="filter-search-title">Тип жилья:</legend>
                        <label><input type="radio" name="housing" checked> Гостиница</label>
                        <label><input type="radio" name="housing"> Мотель</label>
                        <label><input type="radio" name="housing"> Апартаменты</label>
                    </fieldset>
                      <!-- Стоимость -->
                    <fieldset class="filter-group-price">
                        <legend class="filter-search-price">Стоимость, ₽:</legend>
                        <input type="number" placeholder="От" min="0">
                        <input type="number" placeholder="До" max="9000">
                        <button type="submit">ПРИМЕНИТЬ</button>
                        <button type="reset">СБРОСИТЬ</button>
                </form>
            </section>
        </div>
         <!-- Список гостиниц -->
        <section class="hotels-list">
            <div class="container">
                <h2 class="section-title">НАЙДЕНО ГОСТИНИЦ: 38</h2>
                <select class="sort-select">
                    <option>Сначала дешёвые</option>
                </select>
                </div>
    
</body>
</html>
